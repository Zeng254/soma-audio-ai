"""
SOMA pytest 配置文件

用于配置测试行为和自定义标记。
"""

import sys
from pathlib import Path

import pytest


def pytest_configure(config):
    """pytest 初始化钩子"""
    # 注册自定义标记
    config.addinivalue_line(
        "markers",
        "slow: marks tests as slow (deselect with '-m \"not slow\"')"
    )
    config.addinivalue_line(
        "markers",
        "requires_gpu: marks tests that require GPU (skip if no GPU available)"
    )
    config.addinivalue_line(
        "markers",
        "integration: marks tests as integration tests"
    )
    config.addinivalue_line(
        "markers",
        "requires_deps: marks tests that require optional dependencies"
    )


def pytest_collection_modifyitems(config, items):
    """修改收集到的测试项"""
    import os

    # 如果没有 GPU，自动跳过 requires_gpu 测试
    if not _has_gpu():
        skip_gpu = pytest.mark.skip(reason="需要 GPU")
        for item in items:
            if "requires_gpu" in item.keywords:
                item.add_marker(skip_gpu)

    # 检查可选依赖
    for item in items:
        if "requires_deps" in item.keywords:
            # 可以添加更多依赖检查
            pass


def pytest_report_header(config):
    """添加测试报告头信息"""
    import torch
    import numpy as np

    gpu_info = []
    if torch.cuda.is_available():
        gpu_info.append(f"CUDA: {torch.cuda.get_device_name(0)}")
    else:
        gpu_info.append("CUDA: 不可用 (使用 CPU)")

    return [
        f"SOMA Test Suite",
        f"PyTorch: {torch.__version__}",
        f"NumPy: {np.__version__}",
        f"{'; '.join(gpu_info)}",
    ]


def _has_gpu() -> bool:
    """检查是否有 GPU 可用"""
    try:
        import torch
        return torch.cuda.is_available() or (
            hasattr(torch.backends, 'mps') and torch.backends.mps.is_available()
        )
    except ImportError:
        return False


